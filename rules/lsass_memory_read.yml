title: LSASS Memory Read via ProcDump or Task Manager
id: 5e3b1c7f-9a2d-4e8b-bc51-123456789abc
status: stable
description: Detects suspicious LSASS memory access via procdump, Task Manager, or minidump
level: critical
tags:
    - attack.credential_access
    - attack.t1003.001
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        CommandLine|contains:
            - 'lsass'
            - 'procdump'
            - 'MiniDump'
    condition: selection
