# LEMAS Configuration File
# Policy and agent-wide runtime options

analysis:
  default_timeout_seconds: 120
  max_timeout_seconds: 300
  storage_path: "./lemas.db"
  reports_dir: "./reports"
  memory_dumps_dir: "./reports/dumps"
  rules_dir: "./rules"

isolation:
  # Isolation provider: 'job_object' (Windows), 'namespace' (Linux), or 'none' / 'mock' (fallback)
  provider: "job_object"
  cpu_limit_percent: 25        # Restrict process tree to 25% of a CPU core
  memory_limit_mb: 200         # Hard memory budget for execution tree
  max_processes: 10            # Stop fork-bombs

network:
  # Network containment level: 'deny_all', 'loopback_only', or 'monitored_egress' (MITM proxy)
  containment: "loopback_only"
  dns_server: "8.8.8.8"
  pcap_enabled: true
  pcap_max_size_mb: 100

rules:
  yara:
    enabled: true
    fast_scan: true
  sigma:
    enabled: true
    batch_window_ms: 100
